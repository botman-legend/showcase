<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Botsmen Showcase</title>
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/robots.css">
      <style>
    .service-title {
      color: #000;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .service-desc {
      color: #00faff;
      font-size: 1rem;
    }
    #typed {
      margin-top: 20px;
    }
    #menuContent button {
      margin-top: 20px;
      padding: 8px 16px;
      background: #00faff;
      border: none;
      border-radius: 4px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    .menu-container {
      position: relative;   /* anchor the menu to the dots */
      z-index: 3000;        /* keep it above other content */
    }

    .menu {
      position: absolute;
      right: 0;
      top: 40px;            /* drop it below the dots */
      background: rgba(10, 10, 10, 0.95);
      border: 1px solid #00faff;
      border-radius: 8px;
      list-style: none;
      padding: 10px;
      margin: 0;
      box-shadow: 0 0 15px #00faff;
      z-index: 4000;        /* ensure it’s visible */
    }

    .menu li {
      margin: 5px 0;
    }

    .menu li a {
      color: #00faff;
      text-decoration: none;
      transition: 0.3s;
    }

    .menu li a:hover {
      text-shadow: 0 0 10px #00faff;
    }

    .menu-dots {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      user-select: none;
      cursor: pointer;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Loader -->
  <section id="loader">
    <div id="welcomeText">
      <h2 id="textSequence">Welcome to Botsmen.com</h2>
    </div>
    <img id="robotLoader" src="assets/robots/1.PNG" alt="Loading Robot" width="200px">
  </section>

  <!-- Main content -->
  <header id="mainContent">
    <!-- Menu dots -->
    <div class="menu-container">
      <div class="menu-dots" onclick="toggleMenu()">&#8942;</div>
      <ul class="menu hidden" id="menuList">
        <li><a href="#" onclick="showSection('about')">About</a></li>
        <li><a href="#" onclick="showSection('services')">Services</a></li>
        <li><a href="#" onclick="showSection('offer')">Offers</a></li>
      </ul>
    </div>

    <!-- Vision section (initial view) -->
    <div id="visionSection">
      <h1>Meet Botsmen: Your Robotic Business Partner</h1>
      <p>Explore innovation, automation, and smart commerce with Botsmen.</p>
    </div>

    <!-- Menu content (hidden until choice is clicked) -->
    <div id="menuContent" class="hidden"></div>
  </header>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("menuList");
      if (menu) menu.classList.toggle("hidden");
    }
    window.toggleMenu = toggleMenu;

    function showSection(section) {
      document.getElementById("visionSection").classList.add("hidden");
      document.querySelector("h1").classList.add("hidden");
      document.querySelector(".menu-dots").classList.add("hidden");
      document.getElementById("menuList").classList.add("hidden");

      const menuContent = document.getElementById("menuContent");
      menuContent.innerHTML = "";
      menuContent.classList.remove("hidden");

      if (section === "about") {
        const aboutPoints = [
          { title: "• A Domain for Everyone", desc: "Customers can reach your Botman directly, chat, and begin ordering instantly." },
          { title: "• Smart Product Showcase", desc: "Use our ready-made product catalog — you just set your prices." },
          { title: "• Seamless Ordering Experience", desc: "Shoppers interact naturally with your Botman, adding products to their cart and placing orders in real time." },
          { title: "• Orders Dashboard", desc: "Monitor, track, and receive orders through a clear interface that keeps you in control." },
          { title: "• Innovation from Egypt", desc: "This is a new chapter in commerce — let’s build our digital pyramid together." }
        ];
        typeWriterAbout(aboutPoints, menuContent);
      } else if (section === "services") {
        const services = [
          { title: "• Digital Business Platforms", desc: "Build scalable online systems for shops and enterprises." },
          { title: "• Smart Automation Workflows", desc: "Intelligent bots that handle repetitive tasks and adapt to change." },
          { title: "• Cloud-Powered Hosting", desc: "Deploy applications globally with speed and reliability." },
          { title: "• Interactive Dashboards", desc: "Real-time insights with customizable glowing panels." },
          { title: "• Developer-Friendly Ecosystem", desc: "Modular codebase, clear contracts, and collaborative workflows." },
          { title: "• Enhanced Security Layer", desc: "Encrypted channels, role-based access, and automated alerts." }
        ];
        typeWriterServices(services, menuContent);
      } else if (section === "offer") {
        menuContent.innerHTML = `
          <h2>Get an Offer</h2>
          <p>Tell us about your needs and we’ll reply as soon as possible.</p>
          <form id="offerForm">
            <label for="email"><b>Email:</b></label><br>
            <input type="email" id="email" name="email" required><br><br>
            <label for="query"><b>Your Query:</b></label><br>
            <textarea id="query" name="query" rows="4" required></textarea><br><br>
            <button type="submit">Submit</button>
            <button type="button" onclick="goBack()">Back</button>
          </form>
        `;
        document.getElementById("offerForm").onsubmit = function(e) {
          e.preventDefault();
          alert("Thank you! We’ll reply to your email soon.");
          goBack();
        };
      }
    }
    window.showSection = showSection;

    function typeWriterAbout(points, element) {
      element.innerHTML = "<div id='typed'></div><button onclick='goBack()'>Back</button>";
      const typedDiv = document.getElementById("typed");
      let pointIndex = 0;
      function showNextPoint() {
        if (pointIndex < points.length) {
          const { title, desc } = points[pointIndex];
          const block = document.createElement("div");
          block.innerHTML = `<b class="service-title">${title}</b><br><span class="service-desc"></span>`;
          typedDiv.appendChild(block);
          const descSpan = block.querySelector(".service-desc");
          let i = 0;
          function typing() {
            if (i < desc.length) {
              descSpan.innerHTML += desc.charAt(i);
              i++;
              setTimeout(typing, 40);
            } else {
              pointIndex++;
              setTimeout(showNextPoint, 600);
            }
          }
          typing();
        }
      }
      showNextPoint();
    }

    function typeWriterServices(services, element) {
      element.innerHTML = "<div id='typed'></div><button onclick='goBack()'>Back</button>";
      const typedDiv = document.getElementById("typed");
      let serviceIndex = 0;
      function showNextService() {
        if (serviceIndex < services.length) {
          const { title, desc } = services[serviceIndex];
          const block = document.createElement("div");
          block.innerHTML = `<b class="service-title">${title}</b><br><span class="service-desc"></span>`;
          typedDiv.appendChild(block);
          const descSpan = block.querySelector(".service-desc");
          let i = 0;
          function typing() {
            if (i < desc.length) {
              descSpan.innerHTML += desc.charAt(i);
              i++;
              setTimeout(typing, 40);
            } else {
              serviceIndex++;
              setTimeout(showNextService, 600);
            }
          }
          typing();
        }
      }
      showNextService();
    }

    function goBack() {
      document.getElementById("visionSection").classList.remove("hidden");
      document.querySelector("h1").classList.remove("hidden");
      document.querySelector(".menu-dots").classList.remove("hidden");
      document.getElementById("menuContent").classList.add("hidden");
    }
    window.goBack = goBack;
  </script>
</body>
</html>
